window:
  dynamic_padding: true
  class:
    instance: float
    general: Alacritty

font:
  normal:
          family: monospace
  size: 8.0

background_opacity: 0.9
key_bindings:
  - { key: K,    mods: Alt|Shift,       action: ScrollPageUp }
  - { key: J,    mods: Alt|Shift,       action: ScrollPageDown }
  - { key: V,    mods: Alt,             action: Paste            }
